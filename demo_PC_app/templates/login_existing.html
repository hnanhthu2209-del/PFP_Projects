{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<h2>Log In ({{ role }})</h2>
<form method="post" class="card">
  <label>Username
    <input type="text" name="username" required autofocus>
  </label>
  <label>Password
    <input type="password" name="password" required>
  </label>
  <button type="submit">Log In</button>
</form>
{% endblock %}
