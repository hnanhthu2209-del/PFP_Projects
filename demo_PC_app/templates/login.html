{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<h2>Log In</h2>
<p>Are you an Admin or a Buyer?</p>
<form method="post" class="card">
  <label class="radio-option"><input type="radio" name="role" value="admin" required> Admin</label>
  <label class="radio-option"><input type="radio" name="role" value="buyer"> Buyer</label>
  <button type="submit">Continue</button>
</form>
{% endblock %}
